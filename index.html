<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>职场新人模拟器</title>
    <style>
        :root {
            --bg: #1a1a2e; --panel: #16213e; --btn: #0f3460; --btn-hover: #1b4985;
            --text: #e2e8f0; --muted: #94a3b8; --red: #e94560; --green: #4ade80; --gold: #fbbf24;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: 'PingFang SC','Microsoft YaHei',sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* 顶部数值栏 */
        #hud { position: fixed; top: 0; left: 0; right: 0; display: none; justify-content: space-around; padding: 12px 20px; background: rgba(22,33,62,0.97); box-shadow: 0 2px 12px rgba(0,0,0,0.5); z-index: 100; }
        .stat { display: flex; flex-direction: column; align-items: center; position: relative; }
        .stat-label { font-size: 0.75rem; color: var(--muted); margin-bottom: 3px; }
        .stat-val { font-size: 1.3rem; font-weight: bold; transition: color 0.3s; }
        .stat-bar { width: 80px; height: 5px; background: rgba(255,255,255,0.15); border-radius: 3px; margin-top: 4px; overflow: hidden; }
        .stat-fill { height: 100%; border-radius: 3px; transition: width 0.4s ease, background 0.3s; }
        #fill-e { background: var(--green); }
        #fill-r { background: #60a5fa; }
        #fill-m { background: var(--gold); }

        /* 飘字 */
        .float-tag { position: fixed; font-size: 1.1rem; font-weight: bold; pointer-events: none; z-index: 200; animation: floatUp 1.2s ease forwards; }
        .float-pos { color: var(--green); }
        .float-neg { color: var(--red); }
        @keyframes floatUp { 0%{opacity:1;transform:translateY(0) scale(1)} 100%{opacity:0;transform:translateY(-60px) scale(1.3)} }

        /* 预警红晕 */
        #vignette { position: fixed; inset: 0; pointer-events: none; z-index: 50; transition: box-shadow 0.8s; }
        #vignette.danger { box-shadow: inset 0 0 80px 30px rgba(233,69,96,0.6); }

        /* 主内容 */
        #main { flex: 1; margin-top: 80px; padding: 20px; max-width: 560px; width: 100%; align-self: center; display: none; flex-direction: column; justify-content: center; overflow-y: auto; }
        .scene-num { font-size: 0.85rem; color: var(--muted); text-align: center; margin-bottom: 6px; letter-spacing: 2px; text-transform: uppercase; }
        .scene-title { font-size: 1.5rem; color: var(--gold); text-align: center; margin-bottom: 16px; }
        .scene-body { font-size: 1.05rem; line-height: 1.75; background: rgba(0,0,0,0.3); padding: 18px; border-radius: 12px; border-left: 4px solid var(--btn); margin-bottom: 24px; }
        .choices { display: flex; flex-direction: column; gap: 12px; }
        .choice-btn { background: var(--btn); color: var(--text); border: 2px solid transparent; padding: 14px 18px; border-radius: 12px; font-size: 1rem; text-align: left; cursor: pointer; transition: all 0.2s; line-height: 1.45; }
        .choice-btn:hover { background: var(--btn-hover); border-color: var(--gold); }
        .choice-btn:active { transform: scale(0.97); }

        /* 反馈弹窗 */
        #modal { position: fixed; inset: 0; background: rgba(0,0,0,0.82); display: flex; align-items: center; justify-content: center; padding: 20px; z-index: 300; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
        #modal.show { opacity: 1; pointer-events: all; }
        .modal-box { background: var(--panel); padding: 28px; border-radius: 16px; max-width: 400px; width: 100%; text-align: center; border: 1px solid var(--btn); }
        .modal-text { font-size: 1.15rem; line-height: 1.7; margin-bottom: 22px; }
        .modal-deltas { display: flex; justify-content: center; gap: 16px; margin-bottom: 18px; font-size: 1rem; font-weight: bold; }
        .delta-pos { color: var(--green); }
        .delta-neg { color: var(--red); }

        /* 覆盖屏（封面/结局） */
        #overlay { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px; z-index: 400; text-align: center; }
        #overlay.hidden { display: none !important; }
        .logo { font-size: 2.6rem; color: var(--gold); margin-bottom: 8px; }
        .tagline { color: var(--muted); margin-bottom: 40px; font-size: 1.05rem; }
        .talent-card { background: rgba(0,0,0,0.35); border: 1px solid #2d4c7a; border-radius: 14px; padding: 16px; max-width: 440px; margin: 0 auto 22px; }
        .talent-icon { font-size: 2rem; margin-bottom: 8px; }
        .talent-name { color: var(--gold); font-size: 1.15rem; font-weight: bold; margin-bottom: 6px; }
        .talent-desc { color: var(--text); line-height: 1.6; font-size: 0.98rem; }
        .talent-tip { color: var(--muted); margin-bottom: 14px; font-size: 0.92rem; }
        .ending-badge { font-size: 0.9rem; color: var(--muted); margin-bottom: 8px; letter-spacing: 2px; }
        .ending-title { font-size: 2rem; color: var(--red); margin-bottom: 18px; }
        .ending-body { font-size: 1.05rem; line-height: 1.8; background: rgba(0,0,0,0.3); padding: 20px; border-radius: 12px; max-width: 480px; margin-bottom: 28px; }
        .btn-row { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; }

        /* 通用按钮 */
        .btn { padding: 13px 28px; border: none; border-radius: 10px; font-size: 1.05rem; font-weight: bold; cursor: pointer; color: white; transition: transform 0.15s; }
        .btn:active { transform: scale(0.95); }
        .btn-primary { background: var(--red); }
        .btn-secondary { background: var(--btn-hover); }
        .btn-gray { background: #475569; }

        /* Toast */
        #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--green); color: #000; padding: 10px 22px; border-radius: 20px; font-weight: bold; opacity: 0; transition: opacity 0.3s; z-index: 500; pointer-events: none; }
        #toast.show { opacity: 1; }
    </style>
</head>
<body>

<div id="vignette"></div>

<!-- HUD -->
<div id="hud">
    <div class="stat">
        <div class="stat-label">⚡ 精力</div>
        <div class="stat-val" id="v-e">80</div>
        <div class="stat-bar"><div class="stat-fill" id="fill-e" style="width:80%"></div></div>
    </div>
    <div class="stat">
        <div class="stat-label">🤝 信誉</div>
        <div class="stat-val" id="v-r">50</div>
        <div class="stat-bar"><div class="stat-fill" id="fill-r" style="width:50%"></div></div>
    </div>
    <div class="stat">
        <div class="stat-label">💰 钱</div>
        <div class="stat-val" id="v-m">3000</div>
        <div class="stat-bar"><div class="stat-fill" id="fill-m" style="width:50%"></div></div>
    </div>
</div>

<!-- 主内容 -->
<div id="main">
    <div class="scene-num" id="scene-num"></div>
    <div class="scene-title" id="scene-title"></div>
    <div class="scene-body" id="scene-body"></div>
    <div class="choices" id="choices"></div>
</div>

<!-- 反馈弹窗 -->
<div id="modal">
    <div class="modal-box">
        <div class="modal-deltas" id="modal-deltas"></div>
        <div class="modal-text" id="modal-text"></div>
        <button class="btn btn-primary" style="width:100%" onclick="next()">继续 →</button>
    </div>
</div>

<!-- 封面/结局 -->
<div id="overlay">
    <div id="start-view">
        <div class="logo">🏢 职场新人模拟器</div>
        <div class="tagline">打工人的赛博朋克生存指南 v1.1</div>
        <div class="talent-tip">开局先抽 1 张天赋卡，接受命运后才能打工。</div>
        <button id="draw-btn" class="btn btn-secondary" style="font-size:1.1rem;padding:14px 34px;margin-bottom:16px" onclick="drawTalent()">🎴 抽取开局天赋</button>
        <div id="talent-wrap" class="talent-card" style="display:none">
            <div class="talent-icon" id="talent-icon"></div>
            <div class="talent-name" id="talent-name"></div>
            <div class="talent-desc" id="talent-desc"></div>
        </div>
        <button id="accept-btn" class="btn btn-primary" style="display:none;font-size:1.1rem;padding:14px 34px" onclick="startGame()">接受命运 →</button>
    </div>
    <div id="end-view" style="display:none">
        <div class="ending-badge">结局达成</div>
        <div class="ending-title" id="end-title"></div>
        <div class="ending-body" id="end-body"></div>
        <div class="btn-row">
            <button class="btn btn-secondary" onclick="copyShare()">📋 复制分享</button>
            <button class="btn btn-gray" onclick="location.reload()">🔄 重新投胎</button>
        </div>
    </div>
</div>

<div id="toast">已复制！</div>

<script>
const TALENTS = [
    { id: 'social', icon: '🎲', name: '天生社牛', desc: '信誉上限 +20，初始信誉 +10。' },
    { id: 'slacker', icon: '😴', name: '摸鱼达人', desc: '每次选择后精力额外恢复 +5。' },
    { id: 'moonlight', icon: '💸', name: '月光族', desc: '初始钱 -500，但随机事件偶尔意外之财 +200。' },
    { id: 'leader_love', icon: '👑', name: '领导真爱', desc: '所有“讨好领导”选项额外 +5 信誉。' },
    { id: 'workaholic', icon: '🔥', name: '卷王附体', desc: '精力上限 -10，但所有正向信誉增长 x1.2。' },
    { id: 'actor', icon: '🎭', name: '演技派', desc: '解锁隐藏对话，部分原本 -信誉 选项变为 0。' }

const SCENES = [
    {
        num: '第一关',
        title: '入职第一天',
        body: '你被拉进了【发大财不想上班】部门群，老板发了个 10 元红包（50 人份）。旁边工位老员工冷漠地看着你。',
        choices: [
            { text: '🔴 秒抢红包并回复“谢谢老板，老板大气！”', delta: { e: -5, r: 10, m: 1 }, tags: ['pleaseLeader'], fb: '你抢到了 0.01 元，并成功进入老板雷达。代价是每天都要主动营业。' },
            { text: '😶 默默潜水，绝不暴露真实微信号。', delta: { e: 5, r: -10, m: 0 }, fb: '你保持神秘感，HR 以为你被盗号，系统备注：需观察。' },
            { text: '🤣 发尺度略大的表情包活跃气氛。', delta: { e: 10, r: -20, m: 0 }, fb: '群里瞬间沉默，老板撤回红包。你喜提称号【新人炸弹】。' }
        ]
    },
    {
        num: '第二关',
        title: '第一次汇报',
        body: '周会汇报时你发现核心数据多写了一个零：500 万写成了 5000 万。总监正盯着你。',
        choices: [
            { text: '🗣️ 用“底层逻辑”“赋能”硬糊过去。', delta: { e: -15, r: -10, m: 0 }, fb: '黑话输出拉满，总监听完点头，然后在会后问了 HR：这孩子靠谱吗？' },
            { text: '😔 当场认错：“对不起，我刚发现数据有误。”', delta: { e: 5, r: 15, m: -500 }, tags: ['pleaseLeader'], fb: '你保住了人格，没保住绩效。财务系统向你发来一封温柔扣款通知。' },
            { text: '🏃 捂肚子冲厕所，拖到会议结束。', delta: { e: -10, r: -20, m: 0 }, fb: '你躲过了汇报，没躲过外号。全组都开始叫你“跑哥”。' }
        ]
    },
    {
        num: '第三关',
        title: '加班决策',
        body: '周五晚 7 点，你正准备看演唱会（票价 1500）。主管发来消息：明早要紧急 Pitch，能帮忙吗？',
        choices: [
            { text: '😭 票不要了，含泪通宵。', delta: { e: -40, r: 25, m: -1500 }, tags: ['pleaseLeader'], fb: '你失去快乐和金钱，换来一句“你靠得住”。颈椎说它不同意。' },
            { text: '🎵 准点下班，演唱会我来了。', delta: { e: 20, r: -20, m: 0 }, fb: '你收获了现场与眼泪，也收获了主管周一的冷空气。' },
            { text: '🤝 先做一半再走，边界感拉满。', delta: { e: -15, r: 5, m: 0 }, fb: '两边都没讨好，但你保住了一点体面和一点现场。' }
        ]
    },
    {
        num: '第四关',
        title: '职场站队',
        body: '领导 A 与隔壁部门领导 B 正在抢核心项目。A 突然点名：小张，你说谁方案对？',
        choices: [
            { text: '✊ 坚定站队 A，现场撑腰。', delta: { e: -10, r: 20, m: 0 }, tags: ['pleaseLeader'], fb: 'A 对你满意，B 对你永久慢半拍。你学会了“胜利也有副作用”。' },
            { text: '🥣 和稀泥：“两个方案各有优势……”', delta: { e: 5, r: -15, m: 0 }, fb: '你成功避免冲突，也成功变成了“可有可无”的模板。' },
            { text: '🚽 捂肚子遁走（第二次）。', delta: { e: 5, r: -10, m: 0 }, fb: '战火是躲开了，但你的人设从“新人”升级成“慢性肠胃炎”。' }
        ]
    },
    {
        num: '第五关',
        title: '年终 KPI 面谈',
        body: '老板说：你很努力，但名额有限，只能 3.25。明年大项目给你，继续加油。',
        choices: [
            { text: '😤 接受并立誓明年卷死所有人。', delta: { e: -40, r: 15, m: 0 }, tags: ['pleaseLeader'], fb: '你表面微笑，内心做了 28 页复仇型年度计划。' },
            { text: '📱 当场录音走仲裁。', delta: { e: -20, r: -80, m: 3000 }, fb: '你拿到赔偿，也拿到行业八卦榜单前排席位。' },
            { text: '😊 微笑点头，回工位打开招聘软件。', delta: { e: -10, r: 0, m: 0 }, fb: '你掌握了职场高级动作：表面忠诚，后台已投递 37 份简历。' }
        ]
    },
    {
        key: 'ibd_a',
        num: 'IBD 关卡 A',
        title: '跨文化协作危机',
        body: '印度市场要“节庆色彩拉满”，德国团队坚持“参数全链路可追溯”，巴西团队说物流会晚到 4 天。发布会倒计时 72 小时。',
        choices: [
            { text: '🛡️ 铁腕统一：总部模板一刀切。', delta: { e: -10, r: -15, m: 200 }, fb: '对齐很快，现场很冷。你守住了格式，没守住人心。' },
            { text: '🕊️ 全面放权：各国自己玩。', delta: { e: -5, r: -10, m: 350 }, fb: '短期看像创新，复盘时你发现像三家公司同时开发布会。' },
            { text: '🌍 Global Guideline + 30% 本地弹性。', delta: { e: -8, r: 20, m: 80 }, fb: '你把框架和弹性一起交付，会议终于有人点头而不是沉默。' }
        ]
    },
    {
        key: 'ibd_b',
        num: 'IBD 关卡 B',
        title: '合规陷阱',
        body: '代理商建议游走灰色营销边界：GMV 预计 +30%，但法务提醒有罚款与舆情反噬风险。',
        choices: [
            { text: '💰 结果导向：先冲指标再说。', delta: { e: -12, r: -25, m: 900 }, fb: '数据当晚非常好看，法务邮箱第二天非常难看。' },
            { text: '🧱 合规一票否决。', delta: { e: -5, r: 20, m: -250 }, fb: '你保住了底线，没保住短期庆功群。' },
            { text: '🧠 找替代方案：可解释促销 + 合规备案。', delta: { e: -8, r: 15, m: 250 }, fb: '这条路最慢，也最能睡着。团队最后还是跟了你。' }
        ]
    }
];

let caps = { e: 100, r: 100 };
let stats = { e: 80, r: 50, m: 3000 };
let sceneIdx = 0;
let pendingNext = null;
let currentTalent = null;
let ibdFlags = { balanced: 0, compliance: 0, timezone: 0 };
let AC = null;

function getAC() {
    if (!AC) {
        try { AC = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {}
    }
    if (AC && AC.state === 'suspended') { try { AC.resume(); } catch (e) {} }
    return AC;
}

function beep(freq, dur, type = 'sine', vol = 0.3) {
    try {
        const ac = getAC();
        if (!ac) return;
        const o = ac.createOscillator();
        const g = ac.createGain();
        o.connect(g);
        g.connect(ac.destination);
        o.type = type;
        o.frequency.value = freq;
        g.gain.setValueAtTime(vol, ac.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
        o.start();
        o.stop(ac.currentTime + dur);
    } catch (e) {}
}

function playClick() { beep(800, 0.1, 'square', 0.15); }
function playWarn() { beep(200, 0.5, 'sawtooth', 0.2); setTimeout(() => beep(180, 0.4, 'sawtooth', 0.15), 300); }
function playGood() { [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => beep(f, 0.2, 'sine', 0.2), i * 100)); }
function playBad() { [400, 350, 300, 250].forEach((f, i) => setTimeout(() => beep(f, 0.3, 'sawtooth', 0.25), i * 150)); }

function drawTalent() {
    currentTalent = TALENTS[Math.floor(Math.random() * TALENTS.length)];
    document.getElementById('talent-icon').textContent = currentTalent.icon;
    document.getElementById('talent-name').textContent = currentTalent.name;
    document.getElementById('talent-desc').textContent = currentTalent.desc;
    document.getElementById('talent-wrap').style.display = 'block';
    document.getElementById('accept-btn').style.display = 'inline-block';
    document.getElementById('draw-btn').textContent = '🎴 已抽到天赋';
    document.getElementById('draw-btn').disabled = true;
}

function resetRunState() {
    caps = { e: 100, r: 100 };
    stats = { e: 80, r: 50, m: 3000 };
    sceneIdx = 0;
    pendingNext = null;
    ibdFlags = { balanced: 0, compliance: 0, timezone: 0 };

    if (!currentTalent) return;
    if (currentTalent.id === 'social') {
        caps.r = 120;
        stats.r += 10;
    } else if (currentTalent.id === 'moonlight') {
        stats.m -= 500;
    } else if (currentTalent.id === 'workaholic') {
        caps.e = 90;
    }
}

function clampStats() {
    stats.e = Math.max(0, Math.min(caps.e, stats.e));
    stats.r = Math.max(0, Math.min(caps.r, stats.r));
    stats.m = Math.max(0, stats.m);
}

function updateHUD(deltas) {
    if (deltas) {
        stats.e += deltas.e || 0;
        stats.r += deltas.r || 0;
        stats.m += deltas.m || 0;
    }
    clampStats();
    document.getElementById('v-e').textContent = stats.e;
    document.getElementById('v-r').textContent = stats.r;
    document.getElementById('v-m').textContent = stats.m;
    document.getElementById('fill-e').style.width = (stats.e / caps.e * 100) + '%';
    document.getElementById('fill-r').style.width = (stats.r / caps.r * 100) + '%';
    document.getElementById('fill-m').style.width = Math.min(stats.m / 60 * 100, 100) + '%';

    if (stats.e < 20 || stats.r < 20) {
        document.getElementById('vignette').classList.add('danger');
        playWarn();
    } else {
        document.getElementById('vignette').classList.remove('danger');
    }
}

function showFloat(text, el, isPos) {
    const tag = document.createElement('div');
    tag.className = 'float-tag ' + (isPos ? 'float-pos' : 'float-neg');
    tag.textContent = text;
    const rect = el.getBoundingClientRect();
    tag.style.left = (rect.left + rect.width / 2) + 'px';
    tag.style.top = rect.top + 'px';
    document.body.appendChild(tag);
    setTimeout(() => tag.remove(), 1300);
}

function startGame() {
    if (!currentTalent) {
        drawTalent();
        return;
    }
    getAC();
    resetRunState();
    updateHUD();
    document.getElementById('overlay').classList.add('hidden');
    document.getElementById('hud').style.display = 'flex';
    document.getElementById('main').style.display = 'flex';
    showScene(0);
}

function showScene(idx) {
    const s = SCENES[idx];
    document.getElementById('scene-num').textContent = s.num;
    document.getElementById('scene-title').textContent = s.title;
    document.getElementById('scene-body').textContent = s.body;

    const cc = document.getElementById('choices');
    cc.innerHTML = '';
    s.choices.forEach((c, i) => {
        const btn = document.createElement('button');
        btn.className = 'choice-btn';
        btn.textContent = c.text;
        btn.onclick = () => choose(i);
        cc.appendChild(btn);
    });

    const m = document.getElementById('main');
    m.style.opacity = 0;
    setTimeout(() => { m.style.transition = 'opacity 0.4s'; m.style.opacity = 1; }, 50);
}

function fluctuate(v) {
    if (!v) return 0;
    const factor = 1 + (Math.random() * 0.4 - 0.2);
    let out = Math.round(v * factor);
    if (out === 0) out = v > 0 ? 1 : -1;
    return out;
}

function calcChoiceDelta(scene, choice) {
    const d = { ...choice.delta };
    const notes = [];

    if (scene.key && stats.e < 45) ibdFlags.timezone += 1;

    if (currentTalent.id === 'leader_love' && choice.tags && choice.tags.includes('pleaseLeader')) {
        d.r += 5;
        notes.push('👑 领导真爱：讨好领导额外 +5 信誉。');
    }
    if (currentTalent.id === 'workaholic' && d.r > 0) {
        d.r = Math.round(d.r * 1.2);
        notes.push('🔥 卷王附体：正向信誉收益 x1.2。');
    }
    if (currentTalent.id === 'actor' && d.r < 0) {
        d.r = 0;
        notes.push('🎭 演技派：这次负面信誉被你演成了“无事发生”。');
    }
    if (currentTalent.id === 'slacker') {
        d.e += 5;
        notes.push('😴 摸鱼达人：选择后自动回精力 +5。');
    }

    const actual = { e: fluctuate(d.e), r: fluctuate(d.r), m: fluctuate(d.m) };
    if (currentTalent.id === 'moonlight' && Math.random() < 0.28) {
        actual.m += 200;
        notes.push('💸 月光族触发意外之财：+200。');
    }

    return { actual, notes };
}

function choose(choiceIdx) {
    playClick();
    const scene = SCENES[sceneIdx];
    const choice = scene.choices[choiceIdx];
    const payload = calcChoiceDelta(scene, choice);
    const d = payload.actual;

    if (scene.key === 'ibd_a') {
        if (choiceIdx === 2) ibdFlags.balanced += 1;
        if (choiceIdx !== 2) ibdFlags.balanced -= 1;
    }
    if (scene.key === 'ibd_b') {
        if (choiceIdx === 0) ibdFlags.compliance -= 2;
        if (choiceIdx === 1 || choiceIdx === 2) ibdFlags.compliance += 1;
    }

    const hudEl = document.getElementById('hud');
    if (d.e) showFloat((d.e > 0 ? '+' : '') + d.e + '⚡', hudEl, d.e > 0);
    if (d.r) setTimeout(() => showFloat((d.r > 0 ? '+' : '') + d.r + '🤝', hudEl, d.r > 0), 150);
    if (d.m) setTimeout(() => showFloat((d.m > 0 ? '+' : '') + d.m + '💰', hudEl, d.m > 0), 300);

    updateHUD(d);

    const dm = document.getElementById('modal-deltas');
    dm.innerHTML = '';
    if (d.e) { const s = document.createElement('span'); s.className = d.e > 0 ? 'delta-pos' : 'delta-neg'; s.textContent = (d.e > 0 ? '+' : '') + d.e + ' 精力'; dm.appendChild(s); }
    if (d.r) { const s = document.createElement('span'); s.className = d.r > 0 ? 'delta-pos' : 'delta-neg'; s.textContent = (d.r > 0 ? '+' : '') + d.r + ' 信誉'; dm.appendChild(s); }
    if (d.m) { const s = document.createElement('span'); s.className = d.m > 0 ? 'delta-pos' : 'delta-neg'; s.textContent = (d.m > 0 ? '+' : '') + d.m + ' 钱'; dm.appendChild(s); }

    const noteText = payload.notes.length ? '\n\n' + payload.notes.join('\n') : '';
    document.getElementById('modal-text').textContent = choice.fb + noteText;
    document.getElementById('modal').classList.add('show');

    pendingNext = () => {
        document.getElementById('modal').classList.remove('show');
        if (stats.e <= 0) { showEnding('BAD_E'); return; }
        if (stats.r <= 0) { showEnding('BAD_R'); return; }
        if (stats.m <= 0) { showEnding('BAD_M'); return; }
        sceneIdx += 1;
        if (sceneIdx >= SCENES.length) { showEnding('GOOD'); return; }
        showScene(sceneIdx);
    };
}

function next() {
    if (pendingNext) {
        pendingNext();
        pendingNext = null;
    }
}

function buildGoodEnding() {
    if (ibdFlags.compliance < 0) {
        return {
            title: '【国际公关危机制造者】',
            body: '你把 GMV 拉成了火箭，把法务邮箱炸成了烟花。三地团队凌晨开会，所有人都在问：到底是谁拍板的？\n\n职场警示语：短期报表会笑，长期品牌会哭。'
        };
    }
    if (stats.e <= 25 && ibdFlags.timezone >= 2) {
        return {
            title: '【时差绝症患者】',
            body: '你的日历横跨 7 个时区，闹钟多到像交易所 K 线。项目准时上线，你本人在视频会议里灵魂掉线。\n\n职场警示语：跨时区的第一生产力是边界，不是硬扛。'
        };
    }
    if (stats.r >= 85 && ibdFlags.balanced > 0 && ibdFlags.compliance >= 1) {
        return {
            title: '【国际化功勋员工】',
            body: '你把总部节奏、地方差异和合规底线揉成了一套能落地的打法。印度、德国、巴西都在群里给你发了掌声表情。\n\n职场警示语：真正的国际化，不是统一口号，而是统一原则下的本地解法。'
        };
    }
    if (stats.r >= 80) {
        return {
            title: '【KPI 幸存锦鲤】',
            body: `你的信誉高达 ${stats.r}，老板在周会上夸你“稳得像系统默认值”。你笑着领奖，回工位继续改第 19 版周报。\n\n职场警示语：被夸稳定，不代表你不在透支。`
        };
    }
    if (stats.e >= 65) {
        return {
            title: '【边界感圣体】',
            body: `你的精力维持在 ${stats.e}，成功练成“该加班加班、该下线下线”。同事说你佛系，你知道这叫可持续打工。\n\n职场警示语：拒绝不是摆烂，是给关键战役留子弹。`
        };
    }
    return {
        title: '【沉默绩优生】',
        body: `你没大翻车，也没大高光，最终以 ${stats.m} 元现金和一身班味进入下一年。老板记不住你名字，但记得“那个能扛活的”。\n\n职场警示语：没有被看见的努力，迟早变成默认义务。`
    };
}

function showEnding(type) {
    const ENDINGS = {
        BAD_E: {
            title: '【工位仙人】',
            body: '你把自己燃成了项目里的一次性电池。PPT 终于过了，体检报告也终于红了。\n\n职场警示语：拿命换来的“敬业”，通常只会换来下一次默认加班。'
        },
        BAD_R: {
            title: '【光速毕业】',
            body: '你在组织信用系统里被一键清空，工位温度还没凉，权限已经先凉了。离职当天，连门禁都比你先下班。\n\n职场警示语：信誉是慢变量，崩盘只要一瞬间。'
        },
        BAD_M: {
            title: '【现金流蒸发术】',
            body: '你把钱花成了故事，把房租变成了悬念。外卖平台都开始弹窗问你：要不要先领失业关怀券？\n\n职场警示语：情绪消费很爽，月底账单更响。'
        },
        GOOD: null
    };

    let result;
    if (type === 'GOOD') {
        result = buildGoodEnding();
        playGood();
    } else {
        result = ENDINGS[type];
        playBad();
    }

    document.getElementById('end-title').textContent = result.title;
    document.getElementById('end-body').textContent = result.body;
    document.getElementById('start-view').style.display = 'none';
    document.getElementById('end-view').style.display = 'block';
    document.getElementById('overlay').classList.remove('hidden');
    document.getElementById('hud').style.display = 'none';
    document.getElementById('main').style.display = 'none';
    document.getElementById('modal').classList.remove('show');
}

function copyShare() {
    const title = document.getElementById('end-title').textContent;
    const body = document.getElementById('end-body').textContent;
    const talent = currentTalent ? `${currentTalent.icon} ${currentTalent.name}` : '未抽卡';
    const text = `【职场新人模拟器 v1.1】\n天赋：${talent}\n我的结局：${title}\n\n${body}\n\n你敢来试试吗？`;
    navigator.clipboard.writeText(text).then(() => {
        const t = document.getElementById('toast');
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2000);
    }).catch(() => alert(text));
}
